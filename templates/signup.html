{% extends "base.html" %}

{% block title %}Sign Up | Sistem Simulasi 5G{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

{% endblock %}

{% block content %}

<header class="main-header">
  <div class="header-left">
    <h1>5G DRIVE TEST SYSTEM</h1>
  </div>
  <div class="nav-menu">
    <a href="{{ url_for('welcome') }}" class="nav-btn">Home</a>
    <a href="{{ url_for('help_page') }}" class="nav-btn">Help</a>
    <a href="{{ url_for('about') }}" class="nav-btn">About</a>
  </div>
</header>

<div class="main-viewport">
  <div class="card-auth">
    <div class="card-left">
      <img src="{{ url_for('static', filename='property/signup.png') }}" alt="Ilustrasi Sign Up 5G">
    </div>

    <div class="card-right">
      <div class="form-header">
        <h1>SIGN UP</h1>
        <p class="subtitle">Daftarkan akun baru untuk mulai simulasi.</p>
      </div>

      <form method="POST" action="{{ url_for('signup') }}" class="auth-form">
        <div class="input-row">
          <div class="input-group">
            <label class="input-label">Nama Lengkap</label>
            <input type="text" name="full_name" placeholder="Nama Lengkap" class="login-input" required>
          </div>

          <div class="input-group">
            <label class="input-label">Role Pekerjaan</label>
            <select name="role" class="login-input select-input" required>
              <option value="" disabled selected>Pilih Role</option>
              <option value="dt_engineer">DT Engineer</option>
              <option value="rf_engineer">RF Engineer</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Email Address</label>
          <input type="email" name="email" placeholder="contoh@email.com" class="login-input" required>
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>

          <div class="input-eye">
            <input type="password" name="password" placeholder="Buat password minimal 8 karakter" class="login-input"
              required>
            <i class="fas fa-eye toggle-password"></i>
          </div>

        </div>

        <button type="submit" class="btn-auth-submit">SIGN UP</button>

        <p class="auth-footer-text">
          Sudah mempunyai akun?
          <a href="{{ url_for('login') }}">Login Here</a>
        </p>
      </form>
    </div>

  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll('.toggle-password').forEach(icon => {
      icon.addEventListener('click', function () {
        const input = this.closest('.input-eye').querySelector('input');

        if (input.type === "password") {
          input.type = "text";
          this.classList.remove("fa-eye");
          this.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          this.classList.remove("fa-eye-slash");
          this.classList.add("fa-eye");
        }
      });
    });
  });
</script>

{% endblock %}
